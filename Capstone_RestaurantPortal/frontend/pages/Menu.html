<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Food GreenBite — Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <style>
        .category-pill {
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 13.5px;
            font-weight: 500;
            border: 1.5px solid var(--border);
            background: white;
            color: var(--ink-lt);
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
        }
        .category-pill:hover {
            border-color: var(--burgundy);
            color: var(--burgundy);
        }
        .category-pill.active {
            background: var(--burgundy);
            border-color: var(--burgundy);
            color: white;
            box-shadow: 0 4px 14px rgba(107,29,46,.3);
        }

        .menu-item-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            transition: all .25s ease;
            animation: fadeInUp .35s ease both;
        }
        .menu-item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(107,29,46,.12);
        }
        .menu-item-emoji {
            width: 110px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--gold-pale), var(--cream-dk));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .menu-item-body {
            flex: 1;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 4px;
        }
        .item-desc {
            font-size: 13px;
            color: var(--ash);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .item-price {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--burgundy);
        }
        .item-unavailable {
            opacity: .5;
            pointer-events: none;
        }
        .unavailable-badge {
            font-size: 11px;
            font-weight: 600;
            color: #c0392b;
            background: #fdf0ef;
            border: 1px solid #f5c6c3;
            padding: 3px 10px;
            border-radius: 99px;
        }
        .btn-add {
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--burgundy), var(--burgundy-lt));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 18px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, var(--burgundy-dk), var(--burgundy));
            box-shadow: 0 4px 14px rgba(107,29,46,.3);
            transform: scale(1.03);
        }
        .btn-add:active { transform: scale(.97); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--ink);
            color: white;
            padding: 14px 28px;
            border-radius: 99px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.success { background: #1E6B45; }
        #toast.error   { background: #c0392b; }

        /* Category skeleton */
        .skel-pill {
            height: 38px;
            width: 90px;
            border-radius: 99px;
            background: #f0e8d8;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skel-card {
            height: 110px;
            border-radius: 16px;
            background: white;
            border: 1px solid var(--border);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: .5; }
        }
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Category section header */
        .category-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gold-pale);
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body class="bg-cream min-h-screen">

<!-- ═══════════════════════════════════
     NAVBAR
═══════════════════════════════════ -->
<nav class="sticky top-0 z-50 bg-white border-b border-gold/20 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="restaurants.html" class="flex items-center gap-2 text-ash hover:text-burgundy transition text-sm font-dm font-medium">
                ← Back
            </a>
            <div class="w-px h-5 bg-border mx-1"></div>
            <span class="text-3xl">🍽️</span>
            <span class="font-playfair text-2xl font-bold text-burgundy">
                Food<span class="text-gold">Mania</span>
            </span>
        </div>

        <div class="flex items-center gap-4">
            <!-- Cart icon -->
            <a href="cart.html" class="relative">
                <div class="w-10 h-10 bg-cream border border-gold/30 rounded-full flex items-center justify-center hover:bg-gold/10 transition">
                    <span class="text-lg">🛒</span>
                </div>
                <span id="cartCount" class="hidden absolute -top-1 -right-1 bg-burgundy text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </a>

            <!-- User menu -->
            <div class="relative" id="userMenu">
                <button onclick="toggleUserMenu()" class="flex items-center gap-2 bg-burgundy text-white rounded-full px-4 py-2 text-sm font-semibold hover:bg-burgundy-dk transition">
                    <span>👤</span>
                    <span id="userEmailNav">Account</span>
                    <span class="text-xs">▼</span>
                </button>
                <div id="userDropdown" class="hidden absolute right-0 top-12 bg-white border border-gold/20 rounded-2xl shadow-xl w-52 py-2 z-50">
                    <div class="px-4 py-3 border-b border-gold/10">
                        <p class="text-xs text-ash">Signed in as</p>
                        <p class="text-sm font-semibold text-ink truncate" id="userEmailDrop"></p>
                    </div>
                    <a href="orders.html" class="flex items-center gap-3 px-4 py-3 text-sm text-ink hover:bg-cream transition">
                        <span>📦</span> My Orders
                    </a>
                    <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-600 hover:bg-red-50 transition">
                        <span>🚪</span> Sign Out
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ═══════════════════════════════════
     RESTAURANT HERO
═══════════════════════════════════ -->
<section class="bg-gradient-to-br from-burgundy via-burgundy-lt to-burgundy-dk text-white py-12 px-6 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-80 h-80 rounded-full bg-white/5 -translate-y-1/2 translate-x-1/3"></div>
    <div class="absolute bottom-0 left-0 w-48 h-48 rounded-full bg-gold/10 translate-y-1/2 -translate-x-1/4"></div>
    <div class="max-w-7xl mx-auto relative z-10">
        <div class="flex items-center gap-6">
            <div class="w-20 h-20 bg-white/15 rounded-2xl flex items-center justify-center text-4xl flex-shrink-0 border border-white/20">
                <span id="heroEmoji">🍽️</span>
            </div>
            <div>
                <h1 class="font-playfair text-4xl font-bold mb-1" id="restaurantName">Loading...</h1>
                <div class="flex items-center gap-4 text-white/70 text-sm font-dm">
                    <span id="restaurantAddress">📍 --</span>
                    <span id="restaurantPhone">📞 --</span>
                    <span class="inline-flex items-center gap-1.5 bg-green-500/20 border border-green-400/30 text-green-300 px-3 py-1 rounded-full text-xs font-semibold">
                        <span>●</span> Open Now
                    </span>
                </div>
                <p class="text-white/60 text-sm mt-2 font-dm" id="restaurantDesc"></p>
            </div>
        </div>
    </div>
</section>

<!-- ═══════════════════════════════════
     CATEGORY FILTER BAR
═══════════════════════════════════ -->
<div class="sticky top-[73px] z-40 bg-white/90 backdrop-blur border-b border-gold/10">
    <div class="max-w-7xl mx-auto px-6 py-3">
        <div class="flex items-center gap-3 overflow-x-auto scrollbar-hide" id="categoryBar">
            <!-- Skeleton pills -->
            <div class="skel-pill"></div>
            <div class="skel-pill"></div>
            <div class="skel-pill"></div>
            <div class="skel-pill"></div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════ -->
<main class="max-w-7xl mx-auto px-6 py-10">

    <!-- Loading skeletons -->
    <div id="skeletonMenu" class="space-y-3">
        <div class="skel-card"></div>
        <div class="skel-card"></div>
        <div class="skel-card"></div>
        <div class="skel-card"></div>
        <div class="skel-card"></div>
    </div>

    <!-- Menu content -->
    <div id="menuContent" class="hidden space-y-10"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-24">
        <div class="text-6xl mb-4">🍽️</div>
        <h3 class="font-playfair text-2xl font-bold text-ink mb-2">No items found</h3>
        <p class="text-ash font-dm">This restaurant hasn't added any menu items yet.</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="hidden text-center py-24">
        <div class="text-6xl mb-4">⚠️</div>
        <h3 class="font-playfair text-2xl font-bold text-ink mb-2">Something went wrong</h3>
        <p class="text-ash font-dm mb-6" id="errorMsg">Could not load menu</p>
        <button onclick="loadMenuData()" class="bg-burgundy text-white px-6 py-3 rounded-full font-dm font-semibold hover:bg-burgundy-dk transition">
            Try Again
        </button>
    </div>

</main>

<!-- FOOTER -->
<footer class="bg-ink text-white/60 py-8 mt-16">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🍽️</span>
            <span class="font-playfair text-lg font-bold text-white">Food<span class="text-gold">Mania</span></span>
        </div>
        <p class="text-sm font-dm">© 2025 Food Mania. Made with ❤️ for food lovers.</p>
    </div>
</footer>

<!-- TOAST -->
<div id="toast">
    <span id="toastIcon">🛒</span>
    <span id="toastMsg">Item added!</span>
</div>

<script src="../js/utils.js"></script>
<script src="../js/menu.js"></script>
</body>
</html>
