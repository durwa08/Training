<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Green Bite — Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <style>
        /* Green & White Theme */
        :root {
            --green: #10b981;
            --green-dark: #059669;
            --green-light: #d1fae5;
        }

        .category-pill {
            padding: 10px 24px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 500;
            border: 1.5px solid var(--green-light);
            background: white;
            color: #374151;
            cursor: pointer;
            transition: all .2s ease;
            white-space: nowrap;
            font-family: 'DM Sans', sans-serif;
        }
        .category-pill:hover {
            border-color: var(--green-dark);
            color: var(--green-dark);
            background: #f0fdf4;
        }
        .category-pill.active {
            background: var(--green);
            border-color: var(--green);
            color: white;
            box-shadow: 0 4px 14px rgba(16,185,129,.3);
        }

        .menu-item-card {
            background: white;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            transition: all .25s ease;
            animation: fadeInUp .35s ease both;
        }
        .menu-item-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,0,0,.08);
            border-color: var(--green-light);
        }
        .menu-item-emoji {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            border-right: 1.5px solid #e5e7eb;
            position: relative;
            overflow: hidden;
        }
        .menu-item-emoji::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.4), transparent);
            pointer-events: none;
        }
        .menu-item-body {
            flex: 1;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 6px;
        }
        .item-desc {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .item-price {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--green-dark);
        }
        .item-unavailable {
            opacity: .5;
            pointer-events: none;
        }
        .unavailable-badge {
            font-size: 11px;
            font-weight: 600;
            color: #dc2626;
            background: #fee2e2;
            border: 1px solid #fca5a5;
            padding: 4px 12px;
            border-radius: 99px;
        }
        .btn-add {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s ease;
        }
        .btn-add:hover {
            background: var(--green-dark);
            box-shadow: 0 4px 12px rgba(16,185,129,.3);
            transform: scale(1.02);
        }
        .btn-add:active { transform: scale(.98); }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1f2937;
            color: white;
            padding: 14px 28px;
            border-radius: 99px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: transform .35s cubic-bezier(.34,1.56,.64,1);
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.success { background: var(--green-dark); }
        #toast.error   { background: #dc2626; }

        /* Category skeleton */
        .skel-pill {
            height: 40px;
            width: 100px;
            border-radius: 99px;
            background: #f3f4f6;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skel-card {
            height: 130px;
            border-radius: 12px;
            background: white;
            border: 1.5px solid #e5e7eb;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: .5; }
        }
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Category section header */
        .category-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--green-light);
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ═══════════════════════════════════
     NAVBAR
═══════════════════════════════════ -->
<nav class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="restaurants.html" class="flex items-center gap-2 text-gray-600 hover:text-green-600 transition text-sm font-dm font-medium">
                ← Back
            </a>
            <div class="w-px h-5 bg-gray-200"></div>
            <span class="text-3xl">🍽️</span>
            <span class="font-playfair text-2xl font-bold text-green-600">
                Green<span class="text-green-500">Bite</span>
            </span>
        </div>

        <div class="flex items-center gap-4">
            <!-- Cart icon -->
            <a href="cart.html" class="relative">
                <div class="w-10 h-10 bg-green-100 border border-green-300 rounded-full flex items-center justify-center hover:bg-green-200 transition">
                    <span class="text-lg">🛒</span>
                </div>
                <span id="cartCount" class="hidden absolute -top-2 -right-2 bg-green-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </a>

            <!-- User menu -->
            <div class="relative" id="userMenu">
                <button onclick="toggleUserMenu()" class="flex items-center gap-2 bg-green-600 text-white rounded-full px-4 py-2 text-sm font-semibold hover:bg-green-700 transition">
                    <span>👤</span>
                    <span id="userEmailNav" class="hidden sm:inline">Account</span>
                    <span class="text-xs">▼</span>
                </button>
                <div id="userDropdown" class="hidden absolute right-0 top-12 bg-white border border-gray-200 rounded-xl shadow-lg w-52 py-2 z-50">
                    <div class="px-4 py-3 border-b border-gray-100">
                        <p class="text-xs text-gray-600">Signed in as</p>
                        <p class="text-sm font-semibold text-gray-800 truncate" id="userEmailDrop"></p>
                    </div>
                    <a href="orders.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition">
                        <span>📦</span> My Orders
                    </a>
                    <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition">
                        <span>🚪</span> Sign Out
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- ═══════════════════════════════════
     RESTAURANT HERO
═══════════════════════════════════ -->
<section class="bg-gradient-to-br from-green-600 to-green-700 text-white py-12 md:py-16 px-4 md:px-6 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-80 h-80 rounded-full bg-white/5 -translate-y-1/2 translate-x-1/3"></div>
    <div class="absolute bottom-0 left-0 w-48 h-48 rounded-full bg-green-400/10 translate-y-1/2 -translate-x-1/4"></div>
    <div class="max-w-7xl mx-auto relative z-10">
        <div class="flex items-start gap-6 md:gap-8">
            <div class="w-20 h-20 md:w-24 md:h-24 bg-white/15 rounded-2xl flex items-center justify-center text-4xl md:text-5xl flex-shrink-0 border border-white/20">
                <span id="heroEmoji">🍽️</span>
            </div>
            <div class="flex-1">
                <h1 class="font-playfair text-3xl md:text-4xl font-bold mb-2" id="restaurantName">Loading...</h1>
                <div class="flex flex-col md:flex-row md:items-center gap-2 md:gap-4 text-white/80 text-sm font-dm mb-3">
                    <span id="restaurantAddress">📍 --</span>
                    <span id="restaurantPhone">📞 --</span>
                    <div class="inline-flex items-center justify-center gap-1.5 bg-green-500/20 border border-green-400/30 text-green-200 px-3 py-1.5 rounded-full text-xs font-semibold w-fit">
                        <span class="inline-block w-2 h-2 bg-green-300 rounded-full animate-pulse"></span>
                        <span>Open Now</span>
                    </div>
                </div>
                <p class="text-white/70 text-sm font-dm max-w-md" id="restaurantDesc"></p>
            </div>
        </div>
    </div>
</section>

<!-- ═══════════════════════════════════
     CATEGORY FILTER BAR
═══════════════════════════════════ -->
<div class="sticky top-[73px] z-40 bg-white/95 backdrop-blur border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4">
        <div class="flex items-center gap-3 overflow-x-auto scrollbar-hide pb-2" id="categoryBar">
            <!-- Skeleton pills -->
            <div class="skel-pill"></div>
            <div class="skel-pill"></div>
            <div class="skel-pill"></div>
            <div class="skel-pill"></div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════ -->
<main class="max-w-7xl mx-auto px-4 md:px-6 py-12 md:py-16">

    <!-- Loading skeletons -->
    <div id="skeletonMenu" class="space-y-4">
        <div class="skel-card"></div>
        <div class="skel-card"></div>
        <div class="skel-card"></div>
        <div class="skel-card"></div>
        <div class="skel-card"></div>
    </div>

    <!-- Menu content -->
    <div id="menuContent" class="hidden space-y-12"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-24">
        <div class="text-6xl mb-4">🍽️</div>
        <h3 class="font-playfair text-2xl font-bold text-gray-800 mb-2">No items found</h3>
        <p class="text-gray-600 font-dm">This restaurant hasn&apos;t added any menu items yet.</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="hidden text-center py-24">
        <div class="text-6xl mb-4">⚠️</div>
        <h3 class="font-playfair text-2xl font-bold text-gray-800 mb-2">Something went wrong</h3>
        <p class="text-gray-600 font-dm mb-6" id="errorMsg">Could not load menu</p>
        <button onclick="loadMenuData()" class="bg-green-600 text-white px-8 py-3 rounded-full font-dm font-semibold hover:bg-green-700 transition">
            Try Again
        </button>
    </div>

</main>

<!-- FOOTER -->
<footer class="bg-gray-900 text-gray-400 py-12 mt-20">
    <div class="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🍽️</span>
            <span class="font-playfair text-lg font-bold text-white">Green<span class="text-green-500">Bite</span></span>
        </div>
        <p class="text-sm font-dm">© 2025 Green Bite. Made with ❤️ for food lovers.</p>
    </div>
</footer>

<!-- TOAST -->
<div id="toast">
    <span id="toastIcon">🛒</span>
    <span id="toastMsg">Item added!</span>
</div>

<script src="../js/utils.js"></script>
<script src="../js/menu.js"></script>
</body>
</html>
