<!doctype html>
<html lang="en">
<head>
  <!-- Basic meta configuration for responsiveness -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Page title -->
  <title>Restaurant Portal | Register</title>

  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="./styles.css" />
</head>

<!-- data-page helps JS decide which logic to execute -->
<body data-page="register" class="min-h-screen bg-slate-950 text-slate-100">
<div class="relative isolate min-h-screen overflow-hidden">

  <!-- Decorative gradient blobs (purely UI enhancement) -->
  <div class="pointer-events-none absolute inset-0 opacity-70">
    <div class="absolute -top-40 left-10 h-[30rem] w-[30rem] rounded-full bg-emerald-500/20 blur-3xl"></div>
    <div class="absolute -bottom-40 right-1/3 h-[28rem] w-[28rem] rounded-full bg-indigo-600/25 blur-3xl"></div>
  </div>

  <!-- Main centered container -->
  <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">

      <!-- Register card -->
      <div class="rp-card rounded-2xl border border-white/10 bg-white/5 p-6 shadow-xl">

        <!-- Header -->
        <div class="mb-6">
          <p class="text-xs font-semibold tracking-wider text-emerald-300">
            RESTAURANT PORTAL
          </p>
          <h1 class="mt-2 text-2xl font-semibold tracking-tight">
            Create your account
          </h1>
          <p class="mt-1 text-sm text-slate-300">
            Register to start building your restaurant experience.
          </p>
        </div>

        <!-- Alert box (used for success/error messages dynamically via JS) -->
        <div id="alert" class="hidden" role="status" aria-live="polite"></div>

        <!-- Registration form -->
        <form id="registerForm" class="mt-4 space-y-4" novalidate>

          <!-- Full Name -->
          <div>
            <label for="fullName" class="text-sm font-medium text-slate-200">
              Full name
            </label>
            <input
                    id="fullName"
                    name="fullName"
                    type="text"
                    autocomplete="name"
                    class="mt-1 w-full rounded-lg border border-white/10 bg-slate-900/60 px-3 py-2 text-slate-100 outline-none placeholder:text-slate-400 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/30"
                    placeholder="Jane Doe"
                    required
            />
            <!-- Validation message -->
            <p id="fullNameMsg" class="rp-field-message mt-1 text-xs text-rose-200"></p>
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="text-sm font-medium text-slate-200">
              Email
            </label>
            <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    class="mt-1 w-full rounded-lg border border-white/10 bg-slate-900/60 px-3 py-2 text-slate-100 outline-none placeholder:text-slate-400 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/30"
                    placeholder="you@example.com"
                    required
            />
            <!-- Validation message -->
            <p id="emailMsg" class="rp-field-message mt-1 text-xs text-rose-200"></p>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="text-sm font-medium text-slate-200">
              Password
            </label>
            <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="new-password"
                    class="mt-1 w-full rounded-lg border border-white/10 bg-slate-900/60 px-3 py-2 text-slate-100 outline-none placeholder:text-slate-400 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/30"
                    placeholder="Create a strong password"
                    required
            />
            <!-- Validation message -->
            <p id="passwordMsg" class="rp-field-message mt-1 text-xs text-rose-200"></p>

            <!-- Password strength hint (controlled via JS) -->
            <p id="passwordHint" class="mt-1 text-xs text-slate-400"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="text-sm font-medium text-slate-200">
              Confirm password
            </label>
            <input
                    id="confirmPassword"
                    name="confirmPassword"
                    type="password"
                    autocomplete="new-password"
                    class="mt-1 w-full rounded-lg border border-white/10 bg-slate-900/60 px-3 py-2 text-slate-100 outline-none placeholder:text-slate-400 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-500/30"
                    placeholder="Repeat your password"
                    required
            />
            <!-- Validation message -->
            <p id="confirmPasswordMsg" class="rp-field-message mt-1 text-xs text-rose-200"></p>
          </div>

          <!-- Submit button -->
          <button
                  id="submitBtn"
                  type="submit"
                  class="group inline-flex w-full items-center justify-center gap-2 rounded-lg bg-emerald-500 px-4 py-2.5 text-sm font-semibold text-slate-950 shadow-lg shadow-emerald-500/20 transition hover:bg-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 disabled:cursor-not-allowed disabled:opacity-70"
          >
            <!-- Spinner for API loading state -->
            <span
                    id="spinner"
                    class="hidden h-4 w-4 animate-spin rounded-full border-2 border-slate-950/40 border-t-slate-950"
            ></span>
            Create account
          </button>

          <!-- Redirect to login -->
          <p class="text-center text-sm text-slate-300">
            Already have an account?
            <a
                    href="./login.html"
                    class="font-semibold text-emerald-300 hover:text-emerald-200"
            >
              Sign in
            </a>
          </p>
        </form>
      </div>

      <!-- Helpful UX note -->
      <p class="mt-6 text-center text-xs text-slate-400">
        Tip: After registering, you’ll be redirected to login.
      </p>
    </div>
  </main>
</div>

<!-- JS handles validation + API call + redirect -->
<script type="module" src="./script.js"></script>
</body>
</html>
